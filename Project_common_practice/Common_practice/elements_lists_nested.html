<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        ol {
        list-style: none;
        counter-reset: li;
        }
        li:before {
        /* Определяем элемент, который будет нумероваться — li. Псевдоэлемент before указывает, что содержимое, 
        вставляемое при помощи свойства content, будет располагаться перед пунктами списка. Здесь же устанавливается 
        значение приращения счетчика (по умолчанию равно 1). */
        counter-increment: li;
        /* С помощью свойства content выводится номер пункта списка. counters() означает, что генерируемый текст 
        представляет собой значения всех счетчиков с таким именем. Точка в кавычках добавляет разделяющую точку между цифрами, а точка с 
        пробелом добавляется перед содержимым каждого пункта списка */
        content: counters(li, ".") ". ";
        }
    </style>
</head>
<body>
    <ol>
        <li>пункт_1</li>
        <li>пункт_2</li>
            <ol>
                <li>пункт_2.1</li>
                <li>пункт_2.2</li>
                <li>пункт_2.3
                    <ol>
                        <li>пункт_2.3.1</li>
                        <li>пункт_2.3.2</li>
                        <li>пункт_2.3.3</li>
                    </ol>
                </li>
                <li>пункт_2.4</li>
            </ol>
        </li>
        <li>пункт_3</li>
        <li>пункт_4</li>
    </ol>
</body>
</html>
